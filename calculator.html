<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculator | Suraj Kumar Singh</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/calculator.css">
</head>
<body>
  <main class="calculator-page">
    <a class="back-link" href="index.html#projects">← Back to Portfolio</a>

    <section class="calculator-card" aria-label="Calculator">
      <div class="calculator-header">
        <p>JavaScript Project</p>
        <h1>Calculator</h1>
      </div>

      <div class="display" aria-live="polite">
        <span id="history"></span>
        <output id="result">0</output>
      </div>

      <div class="keys">
        <button class="key utility" data-action="clear">AC</button>
        <button class="key utility" data-action="delete">DEL</button>
        <button class="key operator" data-value="%">%</button>
        <button class="key operator" data-value="/">÷</button>

        <button class="key" data-value="7">7</button>
        <button class="key" data-value="8">8</button>
        <button class="key" data-value="9">9</button>
        <button class="key operator" data-value="*">×</button>

        <button class="key" data-value="4">4</button>
        <button class="key" data-value="5">5</button>
        <button class="key" data-value="6">6</button>
        <button class="key operator" data-value="-">−</button>

        <button class="key" data-value="1">1</button>
        <button class="key" data-value="2">2</button>
        <button class="key" data-value="3">3</button>
        <button class="key operator" data-value="+">+</button>

        <button class="key zero" data-value="0">0</button>
        <button class="key" data-value=".">.</button>
        <button class="key equals" data-action="calculate">=</button>
      </div>
    </section>
  </main>

  <script src="js/calculator.js"></script>
</body>
</html>
